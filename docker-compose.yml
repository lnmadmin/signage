services:
  postgres:
    image: postgres:16-alpine
    container_name: signage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signage
      POSTGRES_PASSWORD: signage
      POSTGRES_DB: signage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signage"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: signage-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:latest
    container_name: signage-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE__COOKIE: signage-emqx-cookie
    ports:
      - "1883:1883"     # MQTT (TCP)
      - "8083:8083"     # MQTT over WebSocket
      - "8084:8084"     # MQTT over WSS (TLS)
      - "8883:8883"     # MQTT over SSL/TLS
      - "18083:18083"   # Dashboard  (admin / public)
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  emqx_data:

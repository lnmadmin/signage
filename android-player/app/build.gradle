plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.signage.player'
    compileSdk 34

    defaultConfig {
        applicationId "com.signage.player"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Override in release build: ./gradlew assembleRelease -PBACKEND_URL=https://your-server/api
        def backendUrl = project.findProperty("BACKEND_URL") ?: "http://10.0.2.2:3000"
        buildConfigField "String", "BACKEND_URL", "\"${backendUrl}\""
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
}

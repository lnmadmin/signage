services:
  postgres:
    image: postgres:16-alpine
    container_name: signage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: signage
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signage"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: signage-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: https://media.signage.lawrenceandmayo.in
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
  emqx:
    image: emqx/emqx:latest
    container_name: signage-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE__COOKIE: ${EMQX_COOKIE}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
volumes:
  postgres_data:
  minio_data:
  emqx_data:
